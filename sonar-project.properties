# SonarQube Configuration for Orion CRM

# Project identification
sonar.projectKey=orion-crm
sonar.projectName=Orion CRM
sonar.projectVersion=1.0.0

# Source code
sonar.sources=client/src,server/src
sonar.tests=client/src,server/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.config.js,**/*.config.ts,**/coverage/**

# Language
sonar.language=ts

# TypeScript specific
sonar.typescript.tsconfigPath=server/tsconfig.json,client/tsconfig.json

# Coverage
sonar.javascript.lcov.reportPaths=client/coverage/lcov.info,server/coverage/lcov.info

# Code quality thresholds
sonar.qualitygate.wait=true
